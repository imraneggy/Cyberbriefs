name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "cloudflare-worker/**"
      - ".github/workflows/deploy-worker.yml"

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Validate deployment secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          WORKER_SHARED_SECRET: ${{ secrets.WORKER_SHARED_SECRET }}
        shell: bash
        run: |
          missing=0
          for name in \
            CLOUDFLARE_API_TOKEN \
            CLOUDFLARE_ACCOUNT_ID \
            CLOUDFLARE_KV_NAMESPACE_ID \
            TELEGRAM_BOT_TOKEN \
            TELEGRAM_ADMIN_CHAT_ID \
            INSTAGRAM_ACCESS_TOKEN \
            INSTAGRAM_USER_ID \
            WORKER_SHARED_SECRET
          do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Generate Wrangler config
        working-directory: cloudflare-worker
        env:
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
        shell: bash
        run: |
          cat > wrangler.toml <<EOF
          name = "cyberbriefs-approval"
          main = "src/index.ts"
          compatibility_date = "2024-05-29"

          [[kv_namespaces]]
          binding = "POSTS_KV"
          id = "$CLOUDFLARE_KV_NAMESPACE_ID"
          EOF

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cloudflare-worker
          command: deploy
          secrets: |
            TELEGRAM_BOT_TOKEN
            TELEGRAM_ADMIN_CHAT_ID
            INSTAGRAM_ACCESS_TOKEN
            INSTAGRAM_USER_ID
            WORKER_SHARED_SECRET
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          WORKER_SHARED_SECRET: ${{ secrets.WORKER_SHARED_SECRET }}
